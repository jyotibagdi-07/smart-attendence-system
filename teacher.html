<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">Teacher Dashboard</div>

<!-- Teacher Info -->
<div class="card">
    <h2>Welcome Teacher 👨‍🏫</h2>
    <p>Subject: DevOps</p>
</div>

<!-- Live Attendance Control -->
<div class="card">
    <h3>Live Attendance Control</h3>

    <button onclick="startAttendance()">Start Attendance</button>
    <button onclick="stopAttendance()">Stop Attendance</button>

    <p id="attendanceStatus">Status: OFF ❌</p>
</div>

<!-- Student Attendance -->
<div class="card">
    <h3>Student Attendance</h3>

    <div class="subject">
        <h4>Parvati</h4>
        <div class="progress-bar">
            <div class="progress" style="width:60%"></div>
        </div>
        <p>6 / 10 Days</p>

        <label>
            <input type="checkbox"> Mark Proxy
        </label>
    </div>
</div>

<!-- Assignments -->
<div class="card">
    <h3>Student Assignments</h3>

    <div class="assignment">
        <span>Parvati - Assignment 1</span>
        <button>View PDF</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
