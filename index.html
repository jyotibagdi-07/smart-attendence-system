<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">Smart Attendance System</div>

<div class="card login-box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <select id="role">
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
        <option value="admin">Admin</option>
    </select>

    <button onclick="login()">Login</button>

    <!-- 🔥 Forgot Password -->
    <p class="forgot" onclick="openForgot()">Forgot Password?</p>
</div>

<!-- 🔐 Popup -->
<div class="popup" id="popup">
    <div class="popup-box">
        <h3>Reset Password</h3>
        <input type="text" placeholder="Enter Username">
        <input type="password" placeholder="New Password">
        <button onclick="resetPassword()">Reset</button>
        <button onclick="closeForgot()">Close</button>
    </div>
</div>

<script>
function login() {
    let role = document.getElementById("role").value;

    if (role === "student") window.location.href = "student.html";
    else if (role === "teacher") window.location.href = "teacher.html";
    else window.location.href = "admin.html";
}

// Open popup
function openForgot() {
    document.getElementById("popup").style.display = "flex";
}

// Close popup
function closeForgot() {
    document.getElementById("popup").style.display = "none";
}

// Reset password (backend connect later)
function resetPassword() {
    alert("Password Reset Request Sent!");
    closeForgot();
}
</script>

</body>
</html>
