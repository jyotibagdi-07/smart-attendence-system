<!DOCTYPE html>
<html>
<head>
<title>Change Password</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
body{
    background: linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    font-family:sans-serif;
}

/* CARD */
.card{
    background:white;
    padding:30px;
    border-radius:15px;
    width:340px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    animation: fadeIn 0.3s ease-in-out;
}

/* INPUTS */
input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

/* BUTTONS */
button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#667eea;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#5a67d8;
    transform: scale(1.02);
}

.back{
    background:#ccc;
    color:black;
}

.back:hover{
    background:#bdbdbd;
}

/* MESSAGE */
.msg{
    margin-top:10px;
    font-size:14px;
    min-height:20px;
}

/* TOAST */
.toast{
    position:fixed;
    top:20px;
    right:20px;
    background:#222;
    color:white;
    padding:12px 18px;
    border-radius:8px;
    display:none;
    z-index:9999;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.toast.show{
    display:block;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(-10px);}
    to {opacity:1; transform:translateY(0);}
}
</style>

</head>

<body>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<div class="card">

<h2>🔐 Change Password</h2>

<!-- USER INPUTS -->
<input id="enrollment" placeholder="Enrollment / Username">
<input id="oldPass" type="password" placeholder="Old Password">
<input id="newPass" type="password" placeholder="New Password">

<button onclick="changePassword()">Update Password</button>

<p id="msg" class="msg"></p>

<button class="back" onclick="goBack()">⬅ Back</button>

</div>

<script>

let currentUser = localStorage.getItem("studentName") || "";

window.onload = function () {
    // AUTO-FILL if coming from student dashboard
    if(currentUser){
        document.getElementById("enrollment").value = currentUser;
    }
};

// ================= TOAST =================
function showToast(message, color="#222") {
    let toast = document.getElementById("toast");
    toast.innerText = message;
    toast.style.background = color;

    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 2500);
}

// ================= CHANGE PASSWORD =================
function changePassword() {

    let enrollment = document.getElementById("enrollment").value;
    let oldPass = document.getElementById("oldPass").value;
    let newPass = document.getElementById("newPass").value;

    if(!enrollment || !oldPass || !newPass){
        showToast("Fill all fields ❌", "#dc3545");
        return;
    }

    fetch("/change_password", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            enrollment: enrollment,
            old: oldPass,
            new: newPass
        })
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("msg").innerText = data.message;

        let success = data.message.includes("Updated");

        showToast(
            data.message,
            success ? "#28a745" : "#dc3545"
        );

        // redirect after success
        if(success){
            setTimeout(() => {
                window.location.href = "/";
            }, 1200);
        }
    });
}

// ================= BACK =================
function goBack() {
    window.history.back();
}

</script>

</body>
</html>
