<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="header">Smart Attendance System</div>

<div class="card login-box">
    <h2>Login</h2>

    <input type="text" id="enrollment" placeholder="Enrollment Number">
    <input type="password" id="password" placeholder="Password">

    <select id="role">
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
    </select>

    <button onclick="login()">Login</button>

    <hr>

    <h3>Signup</h3>

    <input type="text" id="name" placeholder="Name">
    <input type="text" id="new_enrollment" placeholder="Enrollment">
    <input type="password" id="new_password" placeholder="Create Password">

    <select id="new_role">
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
    </select>

    <button onclick="signup()">Signup</button>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
