<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teacher Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="static/style.css">
</head>

<body class="student-body">

  <!-- NAVBAR -->
  <div class="navbar">
    <h2 id="teacherName">Hi, Teacher 👋</h2>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard">

    <!-- ATTENDANCE CONTROL -->
    <div class="card highlight">
      <h3>📊 Attendance Control</h3>

      <p>Status:
        <span id="attendanceStatus" class="status off">OFF</span>
      </p>
      <button id="toggleBtn" onclick="toggleAttendance()">
  Start Attendance
</button>
      
    </div>

    <!-- ASSIGNMENTS -->
    <div class="card">
      <h3>📂 Upload Assignments</h3>

      <input type="file" id="assignmentFile">
      <button onclick="uploadFile('assignmentFile', 'Assignment')">
        Upload Assignment
      </button>
    </div>

    <!-- NOTES -->
    <div class="card">
      <h3>📘 Upload Notes</h3>

      <input type="file" id="notesFile">
      <button onclick="uploadFile('notesFile', 'Notes')">
        Upload Notes
      </button>
    </div>

  </div>

  <script src="static/teacher.js"></script>
</body>
</html>
